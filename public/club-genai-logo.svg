<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Oleo+Script:wght@700&amp;display=swap');
      .logo-text {
        font-family: 'Oleo Script', cursive;
        font-weight: 700;
        text-anchor: middle;
        paint-order: stroke fill;
        stroke-linejoin: round;
        stroke-linecap: round;
      }
      .shadow { fill: #5a6b9c; stroke: #5a6b9c; stroke-width: 16px; }
      .main   { fill: #ffffff; stroke: #c29b4b; stroke-width: 16px; }
      .logo-group { transform: rotate(-10deg); transform-origin: 50% 50%; }
    </style>
  </defs>
  <rect width="800" height="500" fill="#141413" rx="24"/>
  <g class="logo-group">
    <text x="425" y="185" font-size="190" dominant-baseline="middle" class="logo-text shadow">Club</text>
    <text x="385" y="345" font-size="190" dominant-baseline="middle" class="logo-text shadow">GenAI</text>
    <text x="410" y="170" font-size="190" dominant-baseline="middle" class="logo-text main">Club</text>
    <text x="370" y="330" font-size="190" dominant-baseline="middle" class="logo-text main">GenAI</text>
  </g>
</svg>
